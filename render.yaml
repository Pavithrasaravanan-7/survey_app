databases:
  - name: survey-db
    plan: free

services:
  - type: web
    name: survey-app
    env: node
    plan: free
    buildCommand: "npm install && npm run build"
    startCommand: "npm start"
    envVars:
      - key: NODE_VERSION
        value: 20.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: survey-db
          property: connectionString
